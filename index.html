<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuickQR • Kigali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { font-family: system-ui, sans-serif; }
        .product-card { transition: all 0.3s; }
        .product-card:active { transform: scale(0.97); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <!-- Navbar -->
    <nav class="bg-black p-5 sticky top-0 z-50 border-b border-white/10">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-bold text-emerald-400">QuickQR</h1>
            <div class="flex gap-3">
                <button onclick="switchTab(0)" id="buy-tab" 
                        class="px-6 py-2 rounded-3xl font-medium bg-emerald-500 text-black">BUY</button>
                <button onclick="switchTab(1)" id="sell-tab" 
                        class="px-6 py-2 rounded-3xl font-medium">SELL</button>
            </div>
        </div>
    </nav>

    <!-- BUY MODE -->
    <div id="buy-mode" class="p-4 max-w-6xl mx-auto">
        <h2 class="text-4xl font-bold mb-2">Find what you need in Kigali</h2>
        <p class="text-zinc-400 mb-8">Add items • Generate QR • Customer scans & pays</p>

        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4" id="products"></div>

        <!-- Floating Cart Button -->
        <button onclick="showCart()" 
                class="fixed bottom-6 right-6 bg-emerald-500 text-black font-bold px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-3 z-50">
            <i class="fa-solid fa-cart-shopping"></i>
            Cart (<span id="cart-count">0</span>)
        </button>

        <!-- Big Floating Scan Button (Very Important for Phone) -->
        <button onclick="startScanner()" 
                class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-white text-black font-bold px-9 py-5 rounded-3xl shadow-2xl flex items-center gap-3 z-50 text-base">
            <i class="fa-solid fa-qrcode text-2xl"></i>
            SCAN QR BILL
        </button>
    </div>

    <!-- Cart Modal -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/90 flex items-end z-[100]">
        <div class="bg-zinc-900 w-full rounded-t-3xl p-6 max-h-[85vh] overflow-auto">
            <h3 class="text-2xl font-bold mb-6">Your Cart</h3>
            <div id="cart-items" class="space-y-4"></div>
            
            <div class="mt-8 pt-6 border-t border-white/10">
                <div class="flex justify-between text-2xl font-semibold">
                    <span>Total</span>
                    <span id="cart-total" class="text-emerald-400"></span>
                </div>
            </div>
            
            <button onclick="generateQR()" 
                    class="mt-8 w-full bg-emerald-500 text-black py-6 rounded-3xl font-bold text-lg">
                GENERATE QR CODE
            </button>
            <button onclick="hideCart()" class="mt-3 w-full py-4 text-zinc-400">Close</button>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div id="qr-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[200]">
        <div class="bg-white text-black p-8 rounded-3xl max-w-xs w-full mx-4 text-center">
            <h3 class="text-xl font-bold mb-6">Scan this QR with your phone</h3>
            <div id="qrcode" class="mx-auto"></div>
            <p class="text-sm text-zinc-600 mt-6">Customer opens camera → scans → sees bill and pays</p>
            <button onclick="hideQR()" class="mt-8 w-full py-4 border border-black rounded-3xl">Close</button>
        </div>
    </div>

    <script>
        let cart = [];
        const products = [
            {id:1, name:"Wireless Earbuds Pro", price:45000, emoji:"🎧"},
            {id:2, name:"Kigali Hoodie", price:28000, emoji:"👕"},
            {id:3, name:"Smart Watch Ultra", price:125000, emoji:"⌚"},
            {id:4, name:"Fresh Avocados (5)", price:8000, emoji:"🥑"},
            {id:5, name:"Leather Wallet", price:22000, emoji:"👛"},
            {id:6, name:"Portable Power Bank", price:35000, emoji:"🔋"},
            {id:7, name:"Ceramic Coffee Mug", price:15000, emoji:"☕"}
        ];

        function renderProducts() {
            const grid = document.getElementById('products');
            grid.innerHTML = '';
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-zinc-900 rounded-3xl p-5 product-card cursor-pointer";
                card.innerHTML = `
                    <div class="text-6xl mb-4">${p.emoji}</div>
                    <div class="font-semibold">${p.name}</div>
                    <div class="text-emerald-400 text-3xl font-bold mt-1">RWF ${p.price.toLocaleString()}</div>
                    <button onclick="addToCart(${p.id}); event.stopImmediatePropagation()" 
                            class="mt-6 w-full bg-emerald-500 text-black py-3 rounded-2xl font-medium">ADD TO CART</button>
                `;
                card.onclick = () => addToCart(p.id);
                grid.appendChild(card);
            });
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            document.getElementById('cart-count').textContent = cart.length;
        }

        function showCart() {
            if (cart.length === 0) return alert("Cart is empty!");
            let html = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                html += `<div class="flex justify-between bg-zinc-800 p-4 rounded-2xl">
                            <span>${item.emoji} ${item.name}</span>
                            <span class="font-bold">RWF ${item.price.toLocaleString()}</span>
                         </div>`;
            });
            document.getElementById('cart-items').innerHTML = html;
            document.getElementById('cart-total').textContent = `RWF ${total.toLocaleString()}`;
            document.getElementById('cart-modal').classList.remove('hidden');
        }

        function hideCart() {
            document.getElementById('cart-modal').classList.add('hidden');
        }

        function generateQR() {
            hideCart();
            const total = cart.reduce((a, b) => a + b.price, 0);
            const qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = '';
            
            new QRCode(qrDiv, {
                text: JSON.stringify({total: total, items: cart}),
                width: 260,
                height: 260
            });
            
            document.getElementById('qr-modal').classList.remove('hidden');
        }

        function hideQR() {
            document.getElementById('qr-modal').classList.add('hidden');
            cart = [];
            document.getElementById('cart-count').textContent = '0';
        }

        function switchTab(n) {
            // Simple for now - only Buy mode is active
        }

        function startScanner() {
            alert("📱 Use your phone camera to scan the QR code shown on the seller's screen.");
        }

        // Initialize
        renderProducts();
    </script>
</body>
</html>
