<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickQR • Kigali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; }
        .product-card { transition: all 0.2s; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <nav class="bg-black p-5 sticky top-0 border-b border-white/10">
        <div class="max-w-6xl mx-auto flex justify-between">
            <h1 class="text-3xl font-bold text-emerald-400">QuickQR</h1>
        </div>
    </nav>

    <div class="p-4 max-w-6xl mx-auto">
        <h2 class="text-3xl font-bold mb-2">Find what you need in Kigali</h2>
        <p class="text-zinc-400 mb-8">Add items • Generate QR • Customer scans & pays</p>

        <div class="grid grid-cols-2 gap-4" id="products"></div>
    </div>

    <!-- Floating Buttons -->
    <button onclick="showCart()" 
            class="fixed bottom-6 right-6 bg-emerald-500 text-black font-bold px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-3 z-50">
        <i class="fa-solid fa-cart-shopping"></i>
        Cart (<span id="cart-count">0</span>)
    </button>

    <button onclick="startScanner()" 
            class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-white text-black font-bold px-10 py-5 rounded-3xl shadow-2xl flex items-center gap-3 z-50">
        <i class="fa-solid fa-qrcode"></i>
        SCAN QR BILL
    </button>

    <!-- Cart Modal -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/80 flex items-end">
        <div class="bg-zinc-900 w-full rounded-t-3xl p-6">
            <h3 class="text-2xl font-bold mb-4">Your Cart</h3>
            <div id="cart-items"></div>
            <div class="mt-6 text-2xl font-bold text-emerald-400" id="total">Total: RWF 0</div>
            <button onclick="generateQR()" 
                    class="mt-8 w-full bg-emerald-500 text-black py-5 rounded-3xl font-bold">
                GENERATE QR CODE
            </button>
            <button onclick="hideCart()" class="mt-3 w-full py-4 text-zinc-400">Close</button>
        </div>
    </div>

    <!-- QR Modal -->
    <div id="qr-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center">
        <div class="bg-white text-black p-8 rounded-3xl max-w-sm w-full mx-4">
            <h3 class="text-xl font-bold text-center mb-6">Scan this QR Code</h3>
            <div id="qrcode" class="mx-auto bg-white p-6 rounded-2xl shadow"></div>
            <p class="text-center text-sm text-zinc-600 mt-6">Open camera on your phone and scan this QR to see the bill and pay</p>
            <button onclick="hideQR()" class="mt-8 w-full py-4 border border-black rounded-3xl">Close</button>
        </div>
    </div>

    <script>
        let cart = [];
        const products = [
            {id:1, name:"Wireless Earbuds Pro", price:45000, emoji:"🎧"},
            {id:2, name:"Kigali Hoodie", price:28000, emoji:"👕"},
            {id:3, name:"Smart Watch Ultra", price:125000, emoji:"⌚"},
            {id:4, name:"Fresh Avocados", price:8000, emoji:"🥑"},
            {id:5, name:"Leather Wallet", price:22000, emoji:"👛"}
        ];

        function renderProducts() {
            const container = document.getElementById('products');
            container.innerHTML = '';
            products.forEach(product => {
                const div = document.createElement('div');
                div.className = "bg-zinc-900 rounded-3xl p-5 product-card";
                div.innerHTML = `
                    <div class="text-6xl mb-4">${product.emoji}</div>
                    <div class="font-medium">${product.name}</div>
                    <div class="text-emerald-400 text-3xl font-bold">RWF ${product.price.toLocaleString()}</div>
                    <button onclick="addToCart(${product.id}); event.stopImmediatePropagation()" 
                            class="mt-6 w-full bg-emerald-500 text-black py-3 rounded-2xl font-medium">ADD TO CART</button>
                `;
                container.appendChild(div);
            });
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            document.getElementById('cart-count').textContent = cart.length;
        }

        function showCart() {
            if (cart.length === 0) {
                alert("Your cart is empty");
                return;
            }

            let html = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                html += `
                    <div class="flex justify-between items-center bg-zinc-800 p-4 rounded-2xl mb-3">
                        <span>${item.emoji} ${item.name}</span>
                        <span class="font-bold">RWF ${item.price.toLocaleString()}</span>
                    </div>`;
            });

            document.getElementById('cart-items').innerHTML = html;
            document.getElementById('total').textContent = `Total: RWF ${total.toLocaleString()}`;
            document.getElementById('cart-modal').classList.remove('hidden');
        }

        function hideCart() {
            document.getElementById('cart-modal').classList.add('hidden');
        }

        function generateQR() {
            hideCart();

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            const orderData = JSON.stringify({
                orderId: "QR" + Date.now(),
                total: total,
                items: cart.map(item => item.name)
            });

            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = `<p class="text-center text-zinc-400">Generating QR...</p>`;

            // Use a reliable public QR code API instead of library
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(orderData)}`;
            
            const img = document.createElement('img');
            img.src = qrUrl;
            img.style.width = '280px';
            img.style.height = '280px';
            img.style.display = 'block';
            img.style.margin = '0 auto';

            img.onload = () => {
                qrContainer.innerHTML = '';
                qrContainer.appendChild(img);
            };

            img.onerror = () => {
                qrContainer.innerHTML = `<p class="text-red-500 text-center">Failed to generate QR. Please try again.</p>`;
            };

            document.getElementById('qr-modal').classList.remove('hidden');
        }

        function hideQR() {
            document.getElementById('qr-modal').classList.add('hidden');
            cart = [];
            document.getElementById('cart-count').textContent = '0';
        }

        function startScanner() {
            alert("📱 Point your phone's camera at the QR code shown on the seller's screen.");
        }

        // Initialize
        renderProducts();
    </script>
</body>
</html>
